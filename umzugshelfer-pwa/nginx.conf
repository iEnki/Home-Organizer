server {
  listen 80;
  server_name localhost; # Wird im Docker-Kontext verwendet, der Hostname ist nicht so wichtig hier
  charset utf-8;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Service Worker: niemals cachen, damit Updates sofort aktiv werden
  location = /service-worker.js {
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Caching für statische Assets (Service Worker explizit ausgenommen)
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|webp|svg|woff|woff2|ttf|eot)$ {
    expires 1M;
    add_header Cache-Control "public";
  }

  # Security Headers (Beispiele)
  # add_header X-Frame-Options "SAMEORIGIN" always;
  # add_header X-XSS-Protection "1; mode=block" always;
  # add_header X-Content-Type-Options "nosniff" always;
  # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
